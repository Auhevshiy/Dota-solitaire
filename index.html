<!DOCTYPE html>
<html>
<head>
    <title>Пасьянс: P2P Мультиплеер</title>
    <!-- Подключаем движок Phaser и библиотеку для сети PeerJS -->
<!-- Используем другие зеркала (cdnjs или unpkg) -->
<script src="phaser.min.js"></script>
<script src="peerjs.min.js"></script>
    
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: sans-serif; text-align: center; }
        #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10; }
        canvas { border: 2px solid #bdc3c7; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="menu">
            <button onclick="createGame()">Создать Лобби</button>
            <input type="text" id="joinId" placeholder="Код друга">
            <button onclick="joinGame()">Подключиться</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
let peer;
let connections = [];

function createGame() {
    console.log("Попытка создать лобби...");
    
    // Создаем объект Peer с настройками по умолчанию
    peer = new Peer(); 

    peer.on('open', (id) => {
        console.log("Лобби успешно создано! ID:", id);
        document.getElementById('status').innerText = "Твой код лобби: " + id;
        document.getElementById('menu').style.display = 'none';
    });

    peer.on('error', (err) => {
        console.error("Ошибка PeerJS:", err.type);
        alert("Ошибка сети: " + err.type + ". Попробуй обновить страницу.");
    });

    peer.on('connection', (conn) => {
        console.log("Кто-то подключился!");
        setupConnection(conn);
    });
}


        // Подключение к хосту (Клиент)
        function joinGame() {
            const hostId = document.getElementById('joinId').value;
            peer = new Peer();
            peer.on('open', (id) => {
                const conn = peer.connect(hostId);
                connections.push(conn);
                setupConnection(conn);
                document.getElementById('menu').style.display = 'none';
                document.getElementById('status').innerText = "Подключено к хосту";
            });
        }

        function setupConnection(conn) {
            conn.on('data', (data) => {
                // Здесь мы будем получать данные о передвижении карт
                if (data.type === 'MOVE_CARD') {
                    updateRemoteCard(data.id, data.x, data.y);
                }
            });
        }

        // --- ЛОГИКА ИГРЫ (Phaser 3) ---

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#27ae60',
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);
        let cards = {};

        function preload() {
            // Создаем простую графику карты (белый прямоугольник)
            let graphics = this.make.graphics({x: 0, y: 0, add: false});
            graphics.fillStyle(0xffffff, 1);
            graphics.fillRect(0, 0, 100, 140);
            graphics.generateTexture('card_back', 100, 140);
        }

        function create() {
            // Создаем тестовую карту
            const myCard = this.add.container(400, 300);
            const cardBody = this.add.sprite(0, 0, 'card_back').setInteractive();
            const cardText = this.add.text(-20, -10, 'HP: 2', { color: '#000' });
            myCard.add([cardBody, cardText]);

            this.input.setDraggable(cardBody);

            // Логика Drag-and-Drop
            this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
                // Двигаем весь контейнер (тело + текст)
                gameObject.parentContainer.x = dragX;
                gameObject.parentContainer.y = dragY;

                // Отправляем координаты всем участникам
                sendMoveData('card_1', dragX, dragY);
            });
        }

        function sendMoveData(cardId, x, y) {
            connections.forEach(conn => {
                if (conn.open) {
                    conn.send({ type: 'MOVE_CARD', id: cardId, x: x, y: y });
                }
            });
        }

        function updateRemoteCard(id, x, y) {
            // В реальной игре здесь мы будем двигать карту на экранах других игроков
            console.log(`Карта ${id} перемещена в ${x}, ${y}`);
        }
    </script>
</body>
</html>
